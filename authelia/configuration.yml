---
# ================================================================
# Authelia — Configuration Production
# ================================================================

server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: 'info'

authentication_backend:
  password_reset:
    disable: true
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'bcrypt'
      bcrypt:
        cost: 12

access_control:
  default_policy: 'deny'
  rules:
    - domain: 'auth.alba-arietis.com'
      policy: 'bypass'
    - domain: '*.alba-arietis.com'
      policy: 'two_factor'

session:
  cookies:
    - name: 'authelia_session'
      domain: 'alba-arietis.com'
      authelia_url: 'https://auth.alba-arietis.com'
      default_redirection_url: 'https://chat.alba-arietis.com'
      expiration: '1 hour'
      inactivity: '5 minutes'

regulation:
  max_retries: 3
  find_time: '2 minutes'
  ban_time: '5 minutes'

storage:
  local:
    path: '/config/db.sqlite3'

notifier:
  filesystem:
    filename: '/config/notifications.txt'

totp:
  issuer: 'alba-arietis.com'
  period: 30
  skew: 1
