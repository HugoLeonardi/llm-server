---
# ================================================================
# Authelia — Configuration (Tests locaux HTTP)
# Les secrets sont injectés via les variables d'environnement
# Docker Compose (voir .env), pas stockés dans ce fichier.
# ================================================================

server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: 'info'

# Authentification par fichier
authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'bcrypt'
      bcrypt:
        cost: 12

# Politique d'accès
# one_factor pour les tests (pas de TOTP requis)
# Passer à two_factor en production
access_control:
  default_policy: 'deny'
  rules:
    - domain: 'auth.llm.test'
      policy: 'bypass'
    - domain: '*.llm.test'
      policy: 'one_factor'

session:
  cookies:
    - name: 'authelia_session'
      domain: 'llm.test'
      authelia_url: 'https://auth.llm.test'
      default_redirection_url: 'https://chat.llm.test'
      expiration: '1 hour'
      inactivity: '5 minutes'

# Protection brute-force
regulation:
  max_retries: 3
  find_time: '2 minutes'
  ban_time: '5 minutes'

# Stockage SQLite (simple pour les tests)
storage:
  local:
    path: '/config/db.sqlite3'

# Notifications écrites dans un fichier (pas besoin d'un serveur mail)
notifier:
  filesystem:
    filename: '/config/notifications.txt'
